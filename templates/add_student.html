{% extends 'base.html' %}

{% block content %}

<div class="form-container">
    <h2>➕ Add New Student</h2>

    {% if message %}
        <div class="message">{{ message }}</div>
    {% endif %}

    <form method="POST" action="{{ url_for('add_student_route') }}">

        <div class="form-group">
            <label for="roll_no">Roll Number</label>
            <input type="text" id="roll_no" name="roll_no" placeholder="e.g. 105" required>
        </div>

        <div class="form-group">
            <label for="name">Student Name</label>
            <input type="text" id="name" name="name" placeholder="e.g. John Smith" required>
        </div>

        <div class="form-group">
            <label for="marks">Marks (0 - 100)</label>
            <input type="number" id="marks" name="marks" min="0" max="100" placeholder="e.g. 85" required>
        </div>

        <div class="form-group">
            <label for="grade">Grade</label>
            <select id="grade" name="grade" required>
                <option value="">-- Select Grade --</option>
                <option value="A">A</option>
                <option value="B">B</option>
                <option value="C">C</option>
                <option value="D">D</option>
                <option value="F">F</option>
            </select>
        </div>

        <button type="submit" class="btn">Add Student</button>

    </form>
</div>

{% endblock %}
