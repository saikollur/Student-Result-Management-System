<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Result System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <nav>
        <div class="nav-brand">🎓 Student Result System</div>
        <div class="nav-links">
            {% if session['username'] is defined and session['username'] %}
                <span class="nav-user">👤 {{ session['username'] }} </span>
            <a href="{{ url_for('home') }}">Home</a>
            <a href="{{ url_for('add_student_route') }}">Add Student</a>
            <a href="{{ url_for('view_students') }}">View All</a>
            <a href="{{ url_for('search') }}">Search</a>
            <a href="{{ url_for('logout') }}" class="btn-logout">Logout</a>
            {% else %}
                <a href="{{ url_for('search') }}">Search Result</a>
                <a href="{{ url_for('login') }}">Admin Login</a>
            {% endif %}
        </div>
    </nav>

    <div class="container">
        {% block content %}
        {% endblock %}
    </div>

</body>
</html>
