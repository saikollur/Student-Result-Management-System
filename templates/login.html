{% extends 'base.html' %}

{% block content %}

<div class="form-container">
    <h2>🔐 Admin Login</h2>

    {% if message %}
        {% if 'success:' in message %}
            <div class="message message-success">{{ message.replace('success:', '') }}</div>
        {% else %}
            <div class="message message-error">{{ message.replace('error:', '') }}</div>
        {% endif %}
    {% endif %}

    <form method="POST" action="{{ url_for('login') }}">

        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" placeholder="Your username" required>
        </div>

        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Your password" required>
        </div>

        <button type="submit" class="btn">Login</button>
        <p style="margin-top:15px; font-size:0.9rem; color:#888;">
            No account yet? <a href="{{ url_for('register') }}">Register here</a>
        </p>

    </form>
</div>

{% endblock %}
