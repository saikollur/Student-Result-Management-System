{% extends 'base.html' %}
{% block content %}

<div class="hero">
    <h1>Welcome to Student Result System</h1>
    <p>Manage and View student results easily</p>

    <div class="card-grid">
        <div class="card">
            <h2>Add Students</h2>
            <p>Add a new student record with marks and grade</p>
            <a href="{{url_for('add_student')}}" class="btn">Go to Add</a>
        </div>

        <div class="card">
            <h2>View All</h2>
            <p>See all students and their results in one place</p>
            <a href="{{url_for('view_students')}}" class="btn">Go to View</a>
        </div>

        <div class="card">
            <h2>Search</h2>
            <a href="{{url_for('search')}}" class="btn">Go to Search</a>
        </div>

    </div>
</div>

{%endblock%}
