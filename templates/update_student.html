{% extends 'base.html' %}

{% block content %}

<div class="form-container">
    <h2>✏️ Update Student</h2>
    <p style="color:#888; margin-bottom:20px;">Editing Roll No: <strong>{{ student['roll_no'] }}</strong></p>

    {% if message %}
        <div class="message">{{ message }}</div>
    {% endif %}

    <form method="POST" action="{{ url_for('update_student_route', roll_no=student['roll_no']) }}">

        <div class="form-group">
            <label for="name">Student Name</label>
            <input type="text" id="name" name="name" value="{{ student['name'] }}" required>
        </div>

        <div class="form-group">
            <label for="marks">Marks (0 - 100)</label>
            <input type="number" id="marks" name="marks" min="0" max="100" value="{{ student['marks'] }}" required>
        </div>

        <div class="form-group">
            <label for="grade">Grade</label>
            <select id="grade" name="grade" required>
                <option value="">-- Select Grade --</option>
                <option value="A"  {% if student['grade'] == 'A' %}selected{% endif %}>A</option>
                <option value="B"  {% if student['grade'] == 'B' %}selected{% endif %}>B</option>
                <option value="C"  {% if student['grade'] == 'C' %}selected{% endif %}>C</option>
                <option value="D"  {% if student['grade'] == 'D' %}selected{% endif %}>D</option>
                <option value="F"  {% if student['grade'] == 'F' %}selected{% endif %}>F</option>
            </select>
        </div>

        <button type="submit" class="btn">Update Student</button>
        <a href="{{ url_for('view_students') }}" class="btn btn-danger">Cancel</a>

    </form>
</div>

{% endblock %}
