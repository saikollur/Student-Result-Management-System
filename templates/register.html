{% extends 'base.html' %}

{% block content %}

<div class="form-container">
    <h2>📝 Create Admin Account</h2>

    {% if message %}
        {% if 'success:' in message %}
            <div class="message message-success">{{ message.replace('success:', '') }}</div>
        {% else %}
            <div class="message message-error">{{ message.replace('error:', '') }}</div>
        {% endif %}
    {% endif %}

    <form method="POST" action="{{ url_for('register') }}">

        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" placeholder="Choose a username" required>
        </div>

        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="At least 6 characters" required>
        </div>

        <div class="form-group">
            <label for="confirm">Confirm Password</label>
            <input type="password" id="confirm" name="confirm" placeholder="Repeat your password" required>
        </div>

        <button type="submit" class="btn">Register</button>
        <p style="margin-top:15px; font-size:0.9rem; color:#888;">
            Already have an account? <a href="{{ url_for('login') }}">Login here</a>
        </p>

    </form>
</div>

{% endblock %}
